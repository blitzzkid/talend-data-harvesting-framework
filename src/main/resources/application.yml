spring:
  application:
    name: metadata-framework
  profiles:
    active: local
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/talend_demo}
    username: ${DB_USER:talend_admin}
    password: ${DB_PASSWORD:}
    hikari:
      maximum-pool-size: 10
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
    open-in-view: false
  flyway:
    # Disabled: the audit table is owned by the Talend ETL job, not this service.
    enabled: false

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

tdc:
  base-url: ${TDC_URL:https://tdc-vm.local}
  # api-path is no longer used for routing (the internal /MM/api/ paths are
  # hardcoded in TdcRestClient/TdcSession), but kept here for reference.
  api-path: ${TDC_API_PATH:/MM/api}
  default-model-id: ${TDC_MODEL_ID:TalendDIModel}
  auth:
    # TDC uses session-based auth: credentials are POSTed once to
    # /MM/j_spring_security_check; the auth.type field is no longer used.
    username: ${TDC_USER:}
    password: ${TDC_PASSWORD:}
  request:
    connect-timeout-ms: 5000
    read-timeout-ms: 30000
  # How harvested lineage reaches TDC: serialized as a Data Mapping Script and
  # delivered for the "Data Mapping Script" import bridge to read.
  import:
    delivery: ${TDC_IMPORT_DELIVERY:local}          # local | sftp
    output-dir: ${TDC_IMPORT_OUTPUT_DIR:build/tdc-scripts}
    sftp:
      host: ${TDC_SFTP_HOST:localhost}              # SSH-tunnel endpoint, not the VM IP
      port: ${TDC_SFTP_PORT:2222}
      username: ${TDC_SFTP_USER:}
      password: ${TDC_SFTP_PASSWORD:}
      remote-dir: ${TDC_SFTP_REMOTE_DIR:/home/work-admin/SQL/}
      strict-host-key-checking: ${TDC_SFTP_STRICT_HOST_KEY:false}

---
spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: jdbc:postgresql://localhost:5432/talend_demo

---
spring:
  config:
    activate:
      on-profile: vm
  # Used when the service runs on the ETL VM and needs to reach TDC across
  # the network bridge. Override DB_URL / TDC_URL via environment.
  datasource:
    url: ${DB_URL:jdbc:postgresql://etl-vm:5432/talend_demo}

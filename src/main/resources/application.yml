spring:
  application:
    name: metadata-framework
  profiles:
    active: local
  datasource:
    url: jdbc:postgresql://localhost:5432/talend_demo
    username: talend
    password: talend
    hikari:
      maximum-pool-size: 10
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        default_schema: audit
    open-in-view: false
  flyway:
    enabled: true
    schemas: audit
    default-schema: audit
    baseline-on-migrate: true

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

tdc:
  base-url: https://tdc.example.com
  api-path: /MM/api/v1
  auth:
    type: bearer            # bearer | basic
    token: ${TDC_TOKEN:}
    username: ${TDC_USER:}
    password: ${TDC_PASSWORD:}
  request:
    connect-timeout-ms: 5000
    read-timeout-ms: 30000
  default-model-id: TalendDIModel

harvest:
  scheduler:
    enabled: true
    fixed-delay-ms: 60000
    batch-size: 100
  idempotency:
    natural-key-template: "{jobName}:{runId}"

---
spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: jdbc:postgresql://localhost:5432/talend_demo
tdc:
  base-url: http://localhost:9090

---
spring:
  config:
    activate:
      on-profile: demo-customer-a
  datasource:
    url: jdbc:postgresql://demo-db:5432/customer_a
tdc:
  default-model-id: CustomerA_Model
harvest:
  scheduler:
    fixed-delay-ms: 30000

---
spring:
  config:
    activate:
      on-profile: demo-customer-b
  datasource:
    url: jdbc:postgresql://demo-db:5432/customer_b
tdc:
  default-model-id: CustomerB_Model

spring:
  application:
    name: metadata-framework
  profiles:
    active: local
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/talend_demo}
    username: ${DB_USER:talend_admin}
    password: ${DB_PASSWORD:}
    hikari:
      maximum-pool-size: 10
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
    open-in-view: false
  flyway:
    # Disabled: the audit table is owned by the Talend ETL job, not this service.
    enabled: false

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

tdc:
  base-url: ${TDC_URL:https://tdc-vm.local}
  # Base path of the official MIMM REST API (see
  # https://metaintegration.net/Products/MIMM/REST-API/). Appended to base-url
  # by RestClientConfig, so callers use short paths like /auth/login.
  api-path: ${TDC_API_PATH:/MM/rest/v1}
  # The PostgreSQL (JDBC) Imported Model — the harvested tables/columns ("the dots").
  harvested-model-id: ${TDC_HARVESTED_MODEL_ID:}
  # The Data Mapping model the audit lineage is pushed into ("the connections").
  lineage-model-id: ${TDC_LINEAGE_MODEL_ID:}
  auth:
    # TDC uses session-based auth: credentials are POSTed once to
    # /MM/j_spring_security_check; the auth.type field is no longer used.
    username: ${TDC_USER:}
    password: ${TDC_PASSWORD:}
  request:
    connect-timeout-ms: 5000
    read-timeout-ms: 30000
  # Internal /MM/api operation paths. Capture the exact path + payload from
  # Chrome DevTools > Network in the TDC UI, then set here. Blank until known.
  api:
    refresh-path: ${TDC_REFRESH_PATH:}      # re-harvest the harvested-model-id
    lineage-path: ${TDC_LINEAGE_PATH:}      # push lineage into lineage-model-id

---
spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: jdbc:postgresql://localhost:5432/talend_demo

---
spring:
  config:
    activate:
      on-profile: vm
  # Used when the service runs on the ETL VM and needs to reach TDC across
  # the network bridge. Override DB_URL / TDC_URL via environment.
  datasource:
    url: ${DB_URL:jdbc:postgresql://etl-vm:5432/talend_demo}

spring:
  application:
    name: metadata-framework
  profiles:
    active: local
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/talend_demo}
    username: ${DB_USER:talend_admin}
    password: ${DB_PASSWORD:}
    hikari:
      maximum-pool-size: 10
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
    open-in-view: false
  flyway:
    # Disabled: the audit table is owned by the Talend ETL job, not this service.
    enabled: false

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

tdc:
  base-url: ${TDC_URL:http://localhost:11480}
  # Base path of the official MIMM REST API. Appended to base-url by RestClientConfig.
  api-path: ${TDC_API_PATH:/MM/rest/v1}
  # Content ID of the PostgreSQL JDBC Imported Model ("the dots").
  # Found in TDC browser URL when the model is selected: objectId=-1_XX → value is -1_XX.
  harvested-model-content-id: ${TDC_HARVESTED_CONTENT_ID:}
  # Content ID of the Data Mapping Script model ("the lines").
  lineage-model-content-id: ${TDC_LINEAGE_CONTENT_ID:}
  # Configuration ID that both models belong to (configId=-1_XX in browser URL).
  config-id: ${TDC_CONFIG_ID:}
  auth:
    username: ${TDC_USER:}
    password: ${TDC_PASSWORD:}
  request:
    connect-timeout-ms: 5000
    read-timeout-ms: 60000
  # SSH credentials for delivering the generated lineage SQL to the TDC VM via SFTP.
  ssh:
    host: ${TDC_SSH_HOST:localhost}
    port: ${TDC_SSH_PORT:2222}
    username: ${TDC_SSH_USER:work-admin}
    password: ${TDC_SSH_PASSWORD:}
    # Absolute path on the TDC VM where the lineage SQL file is written.
    # Must match the path configured in the Data Mapping Script model's Import Setup.
    remote-sql-path: ${TDC_SSH_SQL_PATH:/home/work-admin/SQL/customer_pipeline.sql}

---
spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: jdbc:postgresql://localhost:5432/talend_demo

---
spring:
  config:
    activate:
      on-profile: vm
  # Used when the service runs on the ETL VM and needs to reach TDC across
  # the network bridge. Override DB_URL / TDC_URL via environment.
  datasource:
    url: ${DB_URL:jdbc:postgresql://etl-vm:5432/talend_demo}
